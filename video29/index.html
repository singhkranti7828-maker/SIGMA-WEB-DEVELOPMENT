<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>design this card</title>
    <style>
        body{
            background-color: grey;
        }
        .card{
    background-color: white;
            border: 1px solid black;
            border-radius: 15px;
            height: 60vh;
            width: 35vh;
            margin: 10px;
            padding: 45px;
        }
        .image{
            border: 1px solid;
            border-radius :10px;
            padding: 5px;
        }
        .content{
            /* font-size: 13px; */
            padding:5px 13px;
            color: gray;
        }
        .content p{
            color: gray;
            /* padding: 0px 12px 10px ; */
            font-size: 12px;
        }
        .capsules span{
border: 1px solid;
padding: 4px;
border-radius: 10px;
color: grey;

        }
        .capsules{
            padding:0px 28px 14px;
        }
    
        .button{
            text-align: center;
        }
        .button button{
padding:7px 9px;
border-radius: 10px;
background-color: rgba(0, 0, 255, 0.195);
border: none;
        }
    </style>
</head>
<body>
<div class="card">

<img src="image.png" alt="image" height="180" width="200">

    <br>

</div>
</div>
