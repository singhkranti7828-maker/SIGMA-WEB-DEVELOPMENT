<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css list</title>
    <style>
        nav ul li{
            list-style: devanagari;
            /* list-style: "😂"; */
            background-color: pink;
            list-style-position: inside;
            border: 2px solid blue;
        }
        div ul li{
             list-style: "😂";
             background-color: gray;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li>hame</li>
            <li>about</li>
            <li>cantact</li>
        </ul>
    </nav>
    <div>
        <ul>
            <li>hame</li>
            <li>about</li>
            <li>cantact</li>
        </ul>
    </div>
</body>
</html>
