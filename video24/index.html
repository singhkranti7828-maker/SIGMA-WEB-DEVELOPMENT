<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>style</title>
        <style> 
        .box{
            border: 2px solid black;
            padding: 20px;
            box-shadow: 30px 15px 5px palevioletred;
    
}
.text-shadow{
    text-shadow: 2px 2px 4px green;
    border: 2px solid orange;
    /* outline-offset: 15px; */
    border-radius: 34px;
}
    </style>
<body>
    <div class="box"> i am a box</div>
    <p class="text-shadow">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Quae repellat natus dicta ut nesciunt totam ipsum voluptatem dignissimos, quos nemo.</p>
    
</body>
</html>
