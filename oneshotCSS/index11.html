<!DOCTYPE html>
<html lang="en">>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        header {
            background: #111;
            color: white;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .hero {
            height: 70vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=1200');
            background-size: cover;
            background-position: center;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .hero button {
            padding: 12px 25px;
            border: none;
            background: #ff6b00;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }

        .products {
            padding: 50px;
        }

        .products h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card h3 {
            margin: 15px 0;
        }

        .price {
            color: #ff6b00;
            font-size: 20px;
            font-weight: bold;
        }

        .card button {
            margin: 15px;
            padding: 10px 20px;
            background: #111;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h2>ShoeShop</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Step Into Style</h1>
    <p>Premium Shoes for Every Occasion</p>
    <br>
    <button>Shop Now</button>
</section>

<section class="products">
    <h2>Featured Shoes</h2>

    <div class="product-grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500" alt="Shoe">
            <h3>Running Shoes</h3>
            <p class="price">$89</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=500" alt="Shoe">
            <h3>Sports Sneakers</h3>
            <p class="price">$99</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?w=500" alt="Shoe">
            <h3>Casual Shoes</h3>
            <p class="price">$79</p>
            <button>Add to Cart</button>
        </div>
    </div>
</section>

<footer>
    <p>&copy; 2026 ShoeShop. All Rights Reserved.</p>
</footer>

</body>
</html>
