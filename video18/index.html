<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS BOX MODEL</title>
    <style>
.box{
    background-color: antiquewhite;
}
*{
    margin: 0;
    padding: 0;
}
.box1{
color: rgba(242, 97, 121, 0.963);
padding:10px;
margin:25px;
border: 2px black;
height: 200px;
box-sizing: border-box;
}
.box2{
color:blue;
padding:10px;
margin:25px;
border: 2px black;
height: 200px;
box-sizing: border-box;
}

    </style>
</head>
<body>
    <div class="box box1"> i am a box</div>
    <div class="box box2">i am another box</div>
</body>
</html>
