<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>CSS position</title>
    <style>
        .box{
            border: 2px solid black;

        }
        .box1{

             /* position: relative;
            top: -48px;
            left: 15px; */ 
        
    
        }
         .box2{
            background-color: brown;
           /* position: fixed;
            bottom: 0px;
            left: 8vw;  
             height: 111px; */


        }
        .box3{
            background-color: beige;
           
        }
        .parent{

            position:absolute;
            left: 3px;

        }

</head>
<body>
